<!DOCTYPE html>
<html>
   <head>
      <title></title>

      <link rel="shortcut icon" href="../favicon.ico">
      <link rel="stylesheet" href="../html/resources/default.css">
      <meta name="viewport" content="width=device-width, initial-scale=1">  
   </head>

   <body>
      <!-- Import maps polyfill -- Remove this when import maps will be widely supported-->
      <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>

      </script>  
      <div id="container"></div>
      <div id="webgl-output">     
         <script type="module" src="jogo.js"></script>
      </div>

         <div style="margin-bottom: 15px;">
            <label for="fogSlider" style="display: block; margin-bottom: 8px; font-weight: bold;">Fog Distance: <span id="fogValue">500</span></label>
            <input type="range" id="fogSlider" min="150" max="500" value="500" style="width: 200px; cursor: pointer;">

      </div>
